<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Point GEODIS GT — Planif</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background:#f5f5f5; display:flex; justify-content:center; align-items:flex-start; padding:2rem 1rem; min-height:100vh; }
  .card { background:white; border-radius:12px; box-shadow:0 4px 24px rgba(0,0,0,0.1); max-width:620px; width:100%; overflow:hidden; }
  .header { background:#0f0f0f; color:white; padding:2rem; }
  .logo { font-size:0.85rem; opacity:0.4; margin-bottom:0.75rem; }
  h1 { font-size:1.4rem; margin-bottom:0.5rem; }
  .desc { font-size:0.85rem; opacity:0.65; line-height:1.6; }
  .body { padding:1.5rem 2rem; }
  .intro { font-size:0.82rem; color:#666; margin-bottom:1rem; }
  table { width:100%; border-collapse:collapse; font-size:0.85rem; margin-bottom:1.5rem; }
  th { background:#f5f5f5; padding:0.6rem 0.75rem; text-align:left; font-size:0.7rem; text-transform:uppercase; letter-spacing:0.05em; color:#888; border-bottom:2px solid #eee; }
  td { padding:0.55rem 0.75rem; border-bottom:1px solid #eee; vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:#fafafa; }
  input[type=checkbox] { width:17px; height:17px; accent-color:#2563eb; cursor:pointer; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
  .form-group { margin-bottom:0.75rem; }
  label.fl { display:block; font-size:0.7rem; font-weight:600; color:#888; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:0.3rem; }
  input.fi { width:100%; padding:0.5rem 0.75rem; border:1px solid #ddd; border-radius:6px; font-size:0.875rem; outline:none; }
  input.fi:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,0.1); }
  .footer { padding:1rem 2rem 1.5rem; border-top:1px solid #eee; }
  .btn { display:block; width:100%; padding:0.8rem; background:#2563eb; color:white; border:none; border-radius:8px; font-size:0.9rem; font-weight:600; cursor:pointer; }
  .btn:hover { background:#1d4ed8; }
  .thank-you { display:none; text-align:center; padding:2rem; color:#059669; font-weight:600; font-size:1rem; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="logo">Planif.</div>
    <h1>Point GEODIS GT</h1>
    <div class="desc"></div>
  </div>
  <div class="body" id="voteBody">
    
    <div style="text-align:center;padding:2rem 1rem;">
      <div style="font-size:3rem;margin-bottom:1rem;">🔒</div>
      <div style="font-size:1.1rem;font-weight:600;color:#374151;margin-bottom:0.5rem;">Ce sondage est clôturé</div>
      
      <div style="margin:1rem auto;max-width:340px;background:#f0fdf4;border:1px solid #86efac;border-radius:10px;padding:1rem 1.25rem;">
        <div style="font-size:0.7rem;color:#15803d;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.4rem;">✅ Créneau retenu</div>
        <div style="font-size:1rem;font-weight:700;color:#14532d;">mer. 15 avr. · 14:00–15:00</div>
      </div>
      
      <div style="font-size:0.85rem;color:#6b7280;">Les votes ne sont plus acceptés.</div>
    </div>
    
  </div>
  <div class="footer">
    
    <div class="thank-you" id="ty">✓ Merci ! Votre réponse a bien été enregistrée.</div>
  </div>
</div>
<script>
const API_URL = 'https://suivi.gregoire13.fr/planif_api.php';
const POLL_TOKEN = 'f68769b4df3f';
const SLOT_IDS   = [128,129,130];

async function loadExistingVotes() {
  try {
    const r = await fetch(API_URL + '?action=getVotes&pollId=' + encodeURIComponent(POLL_TOKEN));
    // getVotes attend un pollId numérique — on passe par le token via un endpoint dédié
    const r2 = await fetch(API_URL + '?action=getVotesByToken&token=' + encodeURIComponent(POLL_TOKEN));
    const votes = await r2.json();
    if (!Array.isArray(votes) || !votes.length) return;

    // Regrouper par slot_id
    const bySlot = {};
    votes.forEach(v => {
      if (!bySlot[v.slot_id]) bySlot[v.slot_id] = new Set();
      bySlot[v.slot_id].add(v.participant_name);
    });

    // Afficher les chips dans chaque ligne
    SLOT_IDS.forEach((sid, i) => {
      const names = bySlot[sid] ? [...bySlot[sid]] : [];
      const cell  = document.getElementById('chips' + i);
      if (!cell) return;
      if (names.length) {
        cell.innerHTML = names.map(n =>
          '<span style="display:inline-block;background:#e0e7ff;color:#3730a3;border-radius:4px;padding:1px 7px;margin:1px 2px;font-size:0.72rem;">' + n + '</span>'
        ).join('');
        // Colorer la ligne
        const row = document.getElementById('row' + i);
        if (row) row.style.background = '#fafafa';
      } else {
        cell.textContent = '—';
      }
    });

    // Bandeau résumé
    const totalVoters = new Set(votes.map(v => v.participant_name)).size;
    document.getElementById('existingVotesSummary').textContent =
      totalVoters + ' participant' + (totalVoters > 1 ? 's' : '') + ' ont déjà voté';
    document.getElementById('existingVotes').style.display = 'block';
  } catch(e) {}
}

loadExistingVotes();

async function send() {
  const name  = document.getElementById('vName').value.trim();
  const email = document.getElementById('vEmail').value.trim();
  if (!name)  { alert('Votre nom est requis'); return; }
  if (!email) { alert('Votre email est requis'); return; }
  const slotIds = [...document.querySelectorAll('input[name=slot]:checked')].map(c => parseInt(c.value));
  if (!slotIds.length) { alert('Sélectionnez au moins un créneau'); return; }
  const r = await fetch(API_URL + '?action=submitVote', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token: 'f68769b4df3f', name, email: document.getElementById('vEmail').value.trim(), slotIds })
  });
  const data = await r.json();
  if (data.success) {
    document.getElementById('voteBody').style.display = 'none';
    document.querySelector('.footer .btn').style.display = 'none';
    document.getElementById('ty').style.display = 'block';
  } else {
    alert('Erreur : ' + (data.error || 'Inconnue'));
  }
}
</script>
</body>
</html>
